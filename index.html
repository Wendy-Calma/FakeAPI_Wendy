<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rizz Store — Developer Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav class="rizz-navbar">
  <a href="#" class="rizz-logo">
    <div class="rizz-logo-icon">R</div>
    <div>
      <div class="rizz-logo-text">RIZZ Store</div>
      <div class="rizz-logo-sub">Product Dashboard</div>
    </div>
  </a>
</nav>

<div class="hero-strip">
  <div class="container-fluid px-0">
    <div class="row align-items-center g-3">
      <div class="col-lg-5">
        <h1 class="hero-title">All <span>Products</span></h1>
      </div>
      <div class="col-lg-7">
        <div class="row g-2" id="statsRow">
          <div class="col-6 col-md-3">
            <div class="stat-card d-flex justify-content-between align-items-start">
              <div>
                <div class="stat-label">Total Products</div>
                <div class="stat-value" id="statTotal">—</div>
              </div>
              <i class="bi bi-box-seam stat-icon text-warning"></i>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card d-flex justify-content-between align-items-start">
              <div>
                <div class="stat-label">Categories</div>
                <div class="stat-value" id="statCats">—</div>
              </div>
              <i class="bi bi-tags stat-icon text-warning"></i>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card d-flex justify-content-between align-items-start">
              <div>
                <div class="stat-label">Avg. Price</div>
                <div class="stat-value" id="statAvg">—</div>
              </div>
              <i class="bi bi-currency-dollar stat-icon text-warning"></i>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card d-flex justify-content-between align-items-start">
              <div>
                <div class="stat-label">Avg. Rating</div>
                <div class="stat-value" id="statRating">—</div>
              </div>
              <i class="bi bi-star-half stat-icon text-warning"></i>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <i class="bi bi-search"></i>
    <input type="text" id="searchInput" placeholder="Search products…" />
  </div>

  <select id="categoryFilter" class="filter-select">
    <option value="">All Categories</option>
  </select>

  <select id="sortSelect" class="filter-select">
    <option value="">Sort: Default</option>
    <option value="price-asc">Price ↑</option>
    <option value="price-desc">Price ↓</option>
    <option value="rating-desc">Highest Rated</option>
    <option value="name-asc">Name A–Z</option>
  </select>

  <button class="btn-accent ms-auto" id="refreshBtn">
    <i class="bi bi-arrow-clockwise"></i> Refresh
  </button>

  <span class="hide-mobile" style="color:var(--brand-muted);font-size:.8rem" id="resultCount"></span>
</div>

<div class="table-container">
  <div style="overflow-x:auto; border-radius:12px; border:1px solid var(--brand-border);">
    <table class="products-table" id="productsTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Image</th>
          <th>Title</th>
          <th>Category</th>
          <th>Price</th>
          <th>Rating</th>
          <th class="hide-mobile"></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="loading-row">
          <td colspan="7">
            <div class="spinner-rizz"></div>
            <div style="color:var(--brand-muted);font-size:.88rem">Fetching products from API…</div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<footer class="rizz-footer">
  <strong style="color:#fff">RIZZ Store Dashboard</strong> · Powered by
  <a href="https://fakestoreapi.com" target="_blank">FakeStoreAPI</a> ·
</footer>

<div class="rizz-backdrop" id="productBackdrop">
  <div class="rizz-modal" id="productModal">
    <div class="modal-header-rizz">
      <div>
        <div style="font-size:.72rem;color:var(--brand-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:.3rem">Product Detail</div>
        <div class="modal-product-title" id="modalTitle">—</div>
      </div>
      <button class="modal-close" id="modalClose"><i class="bi bi-x"></i></button>
    </div>
    <div class="modal-body-rizz">
      <div class="row g-3">
        <div class="col-md-5">
          <div class="modal-img-wrap">
            <img id="modalImage" src="" alt="Product Image" />
          </div>
          <div class="mt-3 text-center">
            <div class="modal-price" id="modalPrice">—</div>
          </div>
        </div>
        <div class="col-md-7">
          <div class="info-row">
            <span class="info-label">ID</span>
            <span id="modalId" style="font-family:monospace;color:var(--brand-muted)">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">Category</span>
            <span class="badge-cat" id="modalCategory">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">Rating</span>
            <span class="stars-large" id="modalStars">—</span>
            <span style="color:var(--brand-muted);font-size:.82rem" id="modalRatingVal">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">Reviews</span>
            <span id="modalReviews" style="font-size:.87rem">—</span>
          </div>

          <hr class="divider-rizz"/>

          <div style="font-size:.72rem;color:var(--brand-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:.5rem">Description</div>
          <div class="description-box" id="modalDescription">—</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="rizz-toast" id="rizzToast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
